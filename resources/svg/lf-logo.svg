<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Rounded square background -->
  <rect x="20" y="20" width="160" height="160" rx="30" fill="#2563eb"/>
  
  <!-- Book icon -->
  <g transform="translate(100, 70)">
    <!-- Book cover left -->
    <path d="M -15 -12 L -5 -12 L -5 20 L -15 20 Z" fill="#ffffff" opacity="0.9"/>
    <!-- Book cover right -->
    <path d="M 5 -12 L 15 -12 L 15 20 L 5 20 Z" fill="#ffffff" opacity="0.7"/>
    <!-- Spine -->
    <rect x="-5" y="-12" width="10" height="32" fill="#ffffff"/>
    <!-- Page lines -->
    <line x1="-13" y1="-8" x2="-13" y2="16" stroke="#2563eb" stroke-width="1.5"/>
    <line x1="13" y1="-8" x2="13" y2="16" stroke="#2563eb" stroke-width="1.5"/>
  </g>
  
  <!-- LF Text -->
  <text x="100" y="145" font-family="'Segoe UI', Arial, sans-serif" font-size="56" font-weight="700" text-anchor="middle" fill="#ffffff" letter-spacing="-2">LF</text>
</svg>